Dataset:
  dataset: Kitti
  dataset_path: ../

  frame_ids: [ 0, -1, 1 ]
  scales: [ 0, 1, 2] 
  height: 192
  width: 640

DepthPosePrediction:
  train_set: all
  val_set: 0
  scales: [ 0, 1, 2]
  learning_rate: 0.0001
  scheduler_step_size: 15
  num_workers: 0
  num_epochs: 20
  min_depth: .1
  max_depth:
  disparity_smoothness: .001
  velocity_loss_scaling: .05
  mask_dynamic: False
  save_frequency: -1
  save_val_depth: false
  save_val_depth_batches: 0
  multiple_gpus: false
  gpu_ids:
  batch_size: 
  log_path: ./log
  load_weights_folder: ./log
  use_wandb: False

ReplayBuffer:
  maximize_diversity: True
  max_buffer_size: 50
  similarity_threshold: .95
  similarity_sampling: False
  load_path: ./log/
  load_path_s: ./log/

Slam:
  dataset_sequence: 09
  adaptation: True
  adaptation_epochs: 3
  min_distance: 0.1 
  start_frame: 0  # Start mapping after this frame
  logging: true
  do_loop_closures: False
  keyframe_frequency: 5
  lc_distance_poses: 150  # min num consec poses between lc checks
