Dataset:
  type: Cityscapes
  dataset_path: ../
  scales: [ 0, 1, 2] # Provided by dataloader
  height: 192
  width: 640
  frame_ids: [ 0, -1, 1 ]

DepthPosePrediction:
  train_set: [train]
  val_set: [val]
  scales: [ 0, 1, 2]
  learning_rate: 1e-4
  scheduler_step_size: 15
  batch_size:
  num_workers: 0
  num_epochs: 25
  min_depth: .1
  max_depth:
  disparity_smoothness: .001
  velocity_loss_scaling: .05
  mask_dynamic: false
  log_path: ./log
  save_frequency: 1
  save_val_depth: true
  save_val_depth_batches: 1
  multiple_gpus: True
  gpu_ids: []
  load_weights_folder:
  use_wandb: false
